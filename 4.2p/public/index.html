<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIT725 Week 4 - Locate a Socket</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-wrapper teal">
      <a href="#" class="brand-logo center">Locate a Socket</a>
    </div>
  </nav>

  <div class="container">
    <h4 class="center">EV Charging Stations</h4>
    <p class="center">Week 4 task: data is loaded from MongoDB through a Node.js server API.</p>

    <div class="row" id="card-section"></div>

    <div class="row">
      <div class="col s12">
        <h5>Add a New Station</h5>

        <div class="input-field">
          <input id="stationName" type="text">
          <label for="stationName">Station Name</label>
        </div>

        <div class="input-field">
          <input id="suburb" type="text">
          <label for="suburb">Suburb</label>
        </div>

        <div class="input-field">
          <input id="chargerType" type="text">
          <label for="chargerType">Charger Type</label>
        </div>

        <div class="input-field">
          <input id="availability" type="text">
          <label for="availability">Availability</label>
        </div>

        <div class="input-field">
          <input id="pricePerKwh" type="number" step="0.01">
          <label for="pricePerKwh">Price Per kWh</label>
        </div>

        <div class="input-field">
          <input id="image" type="text" value="images/station1.jpg">
          <label for="image" class="active">Image Path</label>
        </div>

        <button id="formSubmit" type="button" class="btn waves-effect waves-light teal">
          Add Station
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
