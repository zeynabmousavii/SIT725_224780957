<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book Explorer</title>

  <!-- Materialize CSS -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-wrapper">
      <a href="#" class="brand-logo center">Book Explorer</a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container center-align">
    <h3>My Book Collection</h3>
    <p>This app shows books using Express and Materialize</p>

    <!-- Button -->
    <a class="waves-effect waves-light btn" id="clickMeButton">
      Click Me
    </a>

    <!-- Cards will be added here -->
    <div class="row" id="card-section"></div>
  </div>

  <!-- JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="./js/style.js"></script>

</body>
</html>
